<!DOCTYPE html>
<html>
<body>
  <h2>Pressione: V (verde), A (amarelo) ou Shift + V (vermelho)</h2>
  <div id="circulo" style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid black; background-color: gray;"></div>

  <script>
  const circulo = document.querySelector("#circulo");

    document.addEventListener("keydown",(event)=>{
    if(event.key === "v")circulo.style.backgroundColor = "green";
    if(event.key === "a")circulo.style.backgroundColor = "yellow";
    if(event.shiftKey  && event.key === "V") circulo.style.backgroundColor = "red";
  })

  </script>
</body>
</html>
